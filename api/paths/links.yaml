post:
  operationId: createLink
  summary: Create a directed link
  description: |
    Adds a `source -> target` edge. Both notes must exist, source and target
    must differ, and the edge must not already exist.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/LinkCreate.yaml
  responses:
    '201':
      description: The created link.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Link.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '409':
      $ref: ../components/responses/Conflict.yaml
    '422':
      $ref: ../components/responses/UnprocessableEntity.yaml
  tags:
    - links
