name: CI
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  quality:
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            tools/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - name: Generate code (specs + sqlc)
        run: make generate
      - name: OpenAPI spec is canonically formatted
        run: |
          make openapi-format
          git diff --exit-code -- api
      - name: Other YAML is formatted
        run: make yaml-lint
      - name: go.mod / go.sum are tidy
        run: |
          go mod tidy
          go -C tools mod tidy
          git diff --exit-code -- go.mod go.sum tools/go.mod tools/go.sum
  test:
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            tools/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - name: Generate code (specs + sqlc)
        run: make generate
      - name: Run tests
        run: make test
  build:
    name: Build & push image
    needs: [quality, test]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            tools/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - name: Generate code (specs + sqlc)
        run: make generate
      - name: Compute image reference
        id: img
        env:
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          image="ghcr.io/$(printf '%s' "$REPO" | tr '[:upper:]' '[:lower:]')"
          if [ "$EVENT" = "pull_request" ]; then
            raw="$HEAD_REF"
          else
            raw="latest"
          fi
          tag="$(printf '%s' "$raw" | sed -E 's/[^A-Za-z0-9._-]+/-/g; s/^[._-]+//; s/[._-]+$//' | cut -c1-128)"
          [ -n "$tag" ] || tag="build"
          {
            echo "image=$image"
            echo "primary=$tag"
          } >>"$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: |
            ${{ steps.img.outputs.image }}:${{ steps.img.outputs.primary }}
            ${{ steps.img.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  promote:
    name: Promote image -> release tag
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Retag the tagged commit's image as the release tag (no rebuild)
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          image="ghcr.io/$(printf '%s' "$REPO" | tr '[:upper:]' '[:lower:]')"
          tag="$(printf '%s' "$TAG" | sed -E 's/[^A-Za-z0-9._-]+/-/g; s/^[._-]+//; s/[._-]+$//' | cut -c1-128)"
          source="$image:sha-$SHA"
          if ! docker buildx imagetools inspect "$source" >/dev/null 2>&1; then
            echo "::error::no built image $source to promote; the tagged commit must be built on main first"
            exit 1
          fi
          docker buildx imagetools create -t "$image:$tag" "$source"
