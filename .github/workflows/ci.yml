name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            tools/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - name: Generate code (specs + sqlc)
        run: make generate
      - name: OpenAPI spec is canonically formatted
        run: |
          make openapi-format
          git diff --exit-code -- api
      - name: Other YAML is formatted
        run: make yaml-lint
      - name: go.mod / go.sum are tidy
        run: |
          go mod tidy
          go -C tools mod tidy
          git diff --exit-code -- go.mod go.sum tools/go.mod tools/go.sum
